version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: plumid-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: plumid
      MYSQL_USER: plumid
      MYSQL_PASSWORD: plumid_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "-u", "root", "-prootpassword", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plumid-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://plumid:plumid_password@db:3306/plumid?charset=utf8mb4
    ports:
      - "8000:8000"

volumes:
  db_data:
